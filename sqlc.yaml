version: "2"
sql:
  - engine: "postgresql"
    schema: "./internal/db/schema.sql"
    queries: "./internal/db/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "./internal/db/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          
          - db_type: "global_role_enum"
            go_type : "string"
          
          - db_type: "user_gender"
            go_type : "string"
          
          - db_type: "pg_catalog.numeric"
            go_type : "float64"
          
          - db_type: "product_status_enum"
            go_type : "string"
          
          - db_type: "order_status_enum"
            go_type : "string"
          
          - db_type: "payment_status_enum"
            go_type : "string"

          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type :
              type: "float64"
              pointer: true
          
          - column: "chatrooms.type"
            go_type: "string"
          
          - db_type: "project_status_enum"
            go_type : "string"

          - db_type: "revision_status_enum"
            go_type : "string"
          